version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: l5_postgres
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: my_relational_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo_db:
    image: mongo:6.0
    container_name: l5_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: rootuser
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend_api:
    build: ./backend
    container_name: l5_backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres_db
      - mongo_db
    volumes:
      - backend_uploads:/usr/src/app/public/uploads
    command: >
      sh -c "npx prisma generate && 
             npx prisma db push && 
             npx prisma db seed && 
             npm start"
                        
  frontend_app:
    build: ./frontend
    container_name: l5_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend_api

volumes:
  postgres_data:
  mongo_data:
  backend_uploads: 